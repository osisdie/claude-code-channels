stages:
  - lint

markdown-lint:
  stage: lint
  image: davidanson/markdownlint-cli2:latest
  script:
    - markdownlint-cli2 "**/*.md" --config '{"MD013":false,"MD033":false,"MD041":false}'
  rules:
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH

shellcheck:
  stage: lint
  image: koalaman/shellcheck-alpine:latest
  script:
    - find . -name "*.sh" -exec shellcheck -S warning {} +
  rules:
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH
